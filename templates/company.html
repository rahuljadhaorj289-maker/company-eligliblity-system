<!DOCTYPE html>
<html>
<head>
    <title>Company Panel</title>
</head>
<body>

<h2>Company Setup</h2>

<form method="POST">

    <!-- Criteria -->
    10th %: <input name="tenth" required><br>
    12th %: <input name="twelfth" required><br>
    Graduation %: <input name="grad" required><br>
    Backlogs: <input name="backlogs" required><br><br>

    <!-- Number of Questions -->
    Number of Questions: 
    <input type="number" id="numQ" name="num_questions" min="1" required>
    
    <button type="button" onclick="generateQuestions()">Generate Questions</button>

    <br><br>

    <!-- Questions will appear here -->
    <div id="questions"></div>

    <br>
    <button type="submit">Create Company</button>

</form>

<script>
function generateQuestions() {
    let num = document.getElementById("numQ").value;
    let container = document.getElementById("questions");

    container.innerHTML = ""; // clear old

    for (let i = 1; i <= num; i++) {
        container.innerHTML += `
            <h4>Question ${i}</h4>
            Question: <input name="q${i}" required><br>
            Answer: <input name="a${i}" required><br>
            Marks: <input name="m${i}" required><br><br>
        `;
    }
}
</script>

</body>
</html>
